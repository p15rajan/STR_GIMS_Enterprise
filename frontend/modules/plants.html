<div class="panel">

    <h2>🌿 Plants Inventory</h2>

    <div class="toolbar">

        <div>

            <button class="btn" id="btnRefresh">
                🔄 Refresh
            </button>

            <button class="btn" id="btnAddPlant">
                ➕ Add Plant
            </button>

        </div>

        <input
            type="text"
            id="txtSearch"
            placeholder="Search Scientific Name...">

    </div>

    <br>

    <table id="plantsTable">

        <thead>

            <tr>

                <th>Scientific Name</th>

                <th>Common Name</th>

                <th>Forest Range</th>

                <th>Latitude</th>

                <th>Longitude</th>

                <th>Observed On</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            <tr>

                <td colspan="7" align="center">

                    Loading...

                </td>

            </tr>

        </tbody>

    </table>

</div>

<!-- ===================== ADD PLANT MODAL ===================== -->

<div id="plantModal" class="modal" style="display:none;">

    <div class="modal-content">

        <h2>Add Plant Observation</h2>

        <table style="width:100%;border:none;">

            <tr>

                <td>Species</td>

                <td>

                    <select id="cmbSpecies" style="width:100%;padding:8px;">

                    </select>

                </td>

            </tr>

            <tr>

                <td>Forest Range</td>

                <td>

                    <select id="cmbRange" style="width:100%;padding:8px;">

                    </select>

                </td>

            </tr>

            <tr>

                <td>Latitude</td>

                <td>

                    <input
                        id="txtLatitude"
                        type="number"
                        step="0.000001">

                </td>

            </tr>

            <tr>

                <td>Longitude</td>

                <td>

                    <input
                        id="txtLongitude"
                        type="number"
                        step="0.000001">

                </td>

            </tr>

            <tr>

                <td>Observation Date</td>

                <td>

                    <input
                        id="txtObservedOn"
                        type="date">

                </td>

            </tr>

            <tr>

                <td>Remarks</td>

                <td>

                    <textarea
                        id="txtRemarks"
                        rows="4"
                        style="width:100%;"></textarea>

                </td>

            </tr>

        </table>

        <br>

        <div style="text-align:right;">

            <button class="btn" id="btnSavePlant">

                Save

            </button>

            <button class="btn" id="btnCancelPlant">

                Cancel

            </button>

        </div>

    </div>

</div>

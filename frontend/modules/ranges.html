<div class="page">

    <h2>Forest Range Management</h2>

    <div class="card">

        <label>Range Name</label>
        <input id="txtRangeName">

        <label>Division</label>
        <input id="txtDivision">

        <label>District</label>
        <input id="txtDistrict">

        <div class="buttonBar">

            <button id="btnSaveRange">Save</button>

            <button id="btnClearRange">Clear</button>

        </div>

    </div>

    <table id="tblRanges">

        <thead>

            <tr>

                <th>ID</th>
                <th>Range</th>
                <th>Division</th>
                <th>District</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

</div>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>STR GIMS Enterprise</title>

<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">


</head>

<body>
    

<header>

    <h2>🌿 STR GIMS Enterprise</h2>

    <div class="top-right">

        <span id="userLabel"></span>

        <button id="logout">Logout</button>

    </div>

</header>

<div class="wrapper">

    <div class="sidebar">

        <h3>Navigation</h3>

        <ul>

            <li class="active" data-module="dashboard">
                🏠 Dashboard
            </li>

            <li data-module="plants">
                🌿 Plants
            </li>

            <li data-module="animals">
                🐘 Animals
            </li>

            <li data-module="species">
                🌱 Species
            </li>

            <li data-module="ranges">
                🌳 Forest Ranges
            </li>

            <li data-module="projects">
                📁 Projects
            </li>

            <li data-module="map">
                🗺 GIS Map
            </li>

            <li data-module="reports">
                📊 Reports
            </li>

            <li data-module="users">
                👥 Users
            </li>

            <li data-module="settings">
                ⚙ Settings
            </li>

        </ul>

    </div>

    <div class="content">

        <div id="moduleContainer">

         <div class="dashboard">

    <div class="dashboard-cards">

        <div class="card" id="cardPlants">
            <div class="cardIcon">🌳</div>
            <div class="cardValue" id="plantCount">0</div>
            <div class="cardTitle">Plants</div>
        </div>

        <div class="card" id="cardAnimals">
            <div class="cardIcon">🐘</div>
            <div class="cardValue" id="animalCount">0</div>
            <div class="cardTitle">Animals</div>
        </div>

        <div class="card" id="cardSpecies">
            <div class="cardIcon">🌿</div>
            <div class="cardValue" id="speciesCount">0</div>
            <div class="cardTitle">Species</div>
        </div>

        <div class="card" id="cardRanges">
            <div class="cardIcon">🌲</div>
            <div class="cardValue" id="rangeCount">0</div>
            <div class="cardTitle">Forest Ranges</div>
        </div>

    </div>

    <div class="mapContainer">

        <div class="mapToolbar">

            <button id="btnOSM">OpenStreetMap</button>

            <button id="btnPlantsLayer">Plants</button>

            <button id="btnAnimalsLayer">Animals</button>

            <button id="btnBothLayers">Both</button>

            <button id="btnClearLayers">Clear</button>

        </div>

        <div id="map"></div>

    </div>

    <div class="bottomPanels">

        <div class="panel">

            <h3>Recent Plant Observations</h3>

            <table id="recentPlants"></table>

        </div>

        <div class="panel">

            <h3>Recent Animal Observations</h3>

            <table id="recentAnimals"></table>

        </div>

    </div>

</div>
 

            </div>

        </div>

    </div>

</div>

<!-- Load Leaflet FIRST -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"> </script> 
<script type="module">


import CONFIG from "../js/config.js";

const session = JSON.parse(sessionStorage.getItem("gims_session"));

if (!session) {
    location.href = "login.html";
}

document.getElementById("userLabel").innerHTML =
    "Welcome, " + session.full_name;

document.getElementById("logout").onclick = () => {

    sessionStorage.clear();

    location.href = "login.html";

};

/*----------------------------------------------------------
    Save Dashboard HTML
-----------------------------------------------------------*/

const moduleContainer =
    document.getElementById("moduleContainer");

const dashboardHTML =
    moduleContainer.innerHTML;

/*----------------------------------------------------------
    Load Dashboard
-----------------------------------------------------------*/

async function showDashboard() {

    moduleContainer.innerHTML = dashboardHTML;

    const dashboard =
        await import("../js/dashboard.js");

    await dashboard.initializeDashboard();

}

/*----------------------------------------------------------
    First Screen
-----------------------------------------------------------*/

await showDashboard();

/*----------------------------------------------------------
    Navigation
-----------------------------------------------------------*/

document.querySelectorAll(".sidebar li").forEach(item => {

    item.onclick = async () => {

        document
            .querySelectorAll(".sidebar li")
            .forEach(x => x.classList.remove("active"));

        item.classList.add("active");

        const module = item.dataset.module;

        if (module === "dashboard") {

            await showDashboard();

            return;

        }

        const response =
            await fetch("../modules/" + module + ".html");

        if (!response.ok) {

            moduleContainer.innerHTML =

            `<div class="panel">

                <h2>${module}</h2>

                <br>

                Module under development.

            </div>`;

            return;

        }

        moduleContainer.innerHTML =
            await response.text();

        switch (module) {

            case "plants": {

                const mod =
                    await import("../js/plants.js");

                await mod.initializePlants();

                break;

            }

            case "animals": {

                const mod =
                    await import("../js/animals.js");

                await mod.initializeAnimals();

                break;

            }

            case "species": {

                const mod =
                    await import("../js/species.js");

                await mod.initializeSpecies();

                break;

            }

            case "ranges": {

                const mod =
                    await import("../js/ranges.js");

                await mod.initializeRanges();

                break;

            }

            case "map": {

                const mod =
                    await import("../js/map.js");

                await mod.initializeMap();

                break;

            }

        }

    };

});

</script>
</body>

</html>

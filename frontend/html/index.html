<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>STR GIMS Enterprise</title>

<link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

<header>

    <h2>🌿 STR GIMS Enterprise</h2>

    <div class="top-right">

        <span id="userLabel"></span>

        <button id="logout">Logout</button>

    </div>

</header>

<div class="wrapper">

    <div class="sidebar">

        <h3>Navigation</h3>

        <ul>

            <li class="active" data-module="dashboard">
                🏠 Dashboard
            </li>

            <li data-module="plants">
                🌿 Plants
            </li>

            <li data-module="animals">
                🐘 Animals
            </li>

            <li data-module="species">
                🌱 Species
            </li>

            <li data-module="ranges">
                🌳 Forest Ranges
            </li>

            <li data-module="projects">
                📁 Projects
            </li>

            <li data-module="reports">
                📊 Reports
            </li>

            <li data-module="users">
                👥 Users
            </li>

            <li data-module="settings">
                ⚙ Settings
            </li>

        </ul>

    </div>

    <div class="content">

        <div id="moduleContainer">

            <div id="dashboardHome">

                <div class="cards">

                    <div class="card">
                        <h3>Plants</h3>
                        <h1 id="plants">0</h1>
                    </div>

                    <div class="card">
                        <h3>Animals</h3>
                        <h1 id="animals">0</h1>
                    </div>

                    <div class="card">
                        <h3>Species</h3>
                        <h1 id="species">0</h1>
                    </div>

                    <div class="card">
                        <h3>Forest Ranges</h3>
                        <h1 id="ranges">0</h1>
                    </div>

                </div>

                <div class="panel">

                    <h2>Welcome to STR GIMS Enterprise</h2>

                    <p>

                        Select a module from the navigation menu.

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module">

import CONFIG from "../js/config.js";
import {getDashboard} from "../js/api.js";

const session =
JSON.parse(sessionStorage.getItem("gims_session"));

if(!session){

    location.href="login.html";

}

document.getElementById("userLabel").innerHTML=
"Welcome, "+session.full_name;

document.getElementById("logout").onclick=function(){

    sessionStorage.clear();

    location.href="login.html";

};

async function loadDashboard(){

    try{

        const data=await getDashboard();

        if(!data.length)
            return;

        const d=data[0];

        document.getElementById("plants").innerHTML=
        d.total_plants ?? 0;

        document.getElementById("animals").innerHTML=
        d.total_animals ?? 0;

        document.getElementById("species").innerHTML=
        (d.plant_species ?? 0)+(d.animal_species ?? 0);

        document.getElementById("ranges").innerHTML=
        d.forest_ranges ?? 0;

    }

    catch(err){

        console.error(err);

    }

}

loadDashboard();

document.querySelectorAll(".sidebar li").forEach(item => {

    item.onclick = async () => {

        document
            .querySelectorAll(".sidebar li")
            .forEach(x => x.classList.remove("active"));

        item.classList.add("active");

        const module = item.dataset.module;

        if (module === "dashboard") {

            document.getElementById("moduleContainer").innerHTML =
                document.getElementById("dashboardHome").outerHTML;

            loadDashboard();

            return;

        }

        const response = await fetch("../modules/" + module + ".html");

        if (!response.ok) {

            document.getElementById("moduleContainer").innerHTML =
                "<div class='panel'><h2>" + module +
                "</h2><br>Module under development.</div>";

            return;

        }

        document.getElementById("moduleContainer").innerHTML =
            await response.text();

        switch (module) {

            case "plants": {

                const mod = await import("../js/plants.js");
                await mod.initializePlants();
                break;

            }

            case "animals": {

                const mod = await import("../js/animals.js");
                await mod.initializeAnimals();
                break;

            }

        }

    };

});    


</script>

</body>

</html>
